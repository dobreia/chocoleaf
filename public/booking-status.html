<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foglalás állapota | ChocoLeaf</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 20px;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .success {
            color: #28a745;
        }

        .error {
            color: #dc3545;
        }
    </style>
    <script>
        // Create BP element on the window
        window["bp"] = window["bp"] || function () {
            (window["bp"].q = window["bp"].q || []).push(arguments);
        };
        window["bp"].l = 1 * new Date();

        // Insert a script tag on the top of the head to load bp.js
        scriptElement = document.createElement("script");
        firstScript = document.getElementsByTagName("script")[0];
        scriptElement.async = true;
        scriptElement.src = 'https://pixel.barion.com/bp.js';
        firstScript.parentNode.insertBefore(scriptElement, firstScript);
        window['barion_pixel_id'] = 'BP-0000000000-00';

        // Send init event
        bp('init', 'addBarionPixelId', window['barion_pixel_id']);
    </script>

    <noscript>
        <img height="1" width="1" style="display:none" alt="Barion Pixel"
            src="https://pixel.barion.com/a.gif?ba_pixel_id='BP-0000000000-00'&ev=contentView&noscript=1">
    </noscript>
</head>

<body class="bg-cream">
    <div class="status-container">
        <div id="success-message" style="display:none">
            <div class="status-icon success">✓</div>
            <h1>Sikeres foglalás!</h1>
            <p>Köszönjük a foglalást! A részleteket elküldtük emailben.</p>
        </div>

        <div id="error-message" style="display:none">
            <div class="status-icon error">×</div>
            <h1>Sikertelen foglalás</h1>
            <p>Sajnáljuk, a fizetés nem sikerült. Kérjük próbálja újra később.</p>
        </div>

        <a href="index.html"><button class="button-primary mt-4">Vissza a főoldalra</button></a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status');

            if (status === 'success') {
                document.getElementById('success-message').style.display = 'block';
            } else {
                document.getElementById('error-message').style.display = 'block';
            }
        });
    </script>
</body>

</html>
