<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>Átirányítás...</title>
    <script>
        // Create BP element on the window
        window["bp"] = window["bp"] || function () {
            (window["bp"].q = window["bp"].q || []).push(arguments);
        };
        window["bp"].l = 1 * new Date();

        // Insert a script tag on the top of the head to load bp.js
        scriptElement = document.createElement("script");
        firstScript = document.getElementsByTagName("script")[0];
        scriptElement.async = true;
        scriptElement.src = 'https://pixel.barion.com/bp.js';
        firstScript.parentNode.insertBefore(scriptElement, firstScript);
        window['barion_pixel_id'] = 'BP-0000000000-00';

        // Send init event
        bp('init', 'addBarionPixelId', window['barion_pixel_id']);
    </script>

    <noscript>
        <img height="1" width="1" style="display:none" alt="Barion Pixel"
            src="https://pixel.barion.com/a.gif?ba_pixel_id='BP-0000000000-00'&ev=contentView&noscript=1">
    </noscript>
</head>

<body>
    <p>Átirányítás folyamatban...</p>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const course = params.get('course');

            if (!course) {
                console.error('Nincs megadva kurzus!');
                window.location.href = '/booking-status.html?status=error';
                return;
            }

            try {
                const response = await fetch('/api/payment/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        course: course
                    })
                });

                const data = await response.json();

                if (data.paymentUrl) {
                    window.location.href = data.paymentUrl;
                } else {
                    throw new Error('Hiányzó payment URL');
                }
            } catch (error) {
                console.error('Hiba:', error);
                window.location.href = '/booking-status.html?status=error';
            }
        });
    </script>
</body>

</html>
