<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <title>Köszönjük a vásárlást | ChocoLeaf</title>
  <link rel="stylesheet" href="css/thankyou.css">
  <script>
    // Create BP element on the window
    window["bp"] = window["bp"] || function () {
      (window["bp"].q = window["bp"].q || []).push(arguments);
    };
    window["bp"].l = 1 * new Date();

    // Insert a script tag on the top of the head to load bp.js
    scriptElement = document.createElement("script");
    firstScript = document.getElementsByTagName("script")[0];
    scriptElement.async = true;
    scriptElement.src = 'https://pixel.barion.com/bp.js';
    firstScript.parentNode.insertBefore(scriptElement, firstScript);
    window['barion_pixel_id'] = 'BP-0000000000-00';

    // Send init event
    bp('init', 'addBarionPixelId', window['barion_pixel_id']);
  </script>

  <noscript>
    <img height="1" width="1" style="display:none" alt="Barion Pixel"
      src="https://pixel.barion.com/a.gif?ba_pixel_id='BP-0000000000-00'&ev=contentView&noscript=1">
  </noscript>
</head>

<body>
  <section class="thankyou">
    <div class="container">
      <h1>Köszönjük a foglalást!</h1>
      <p>A fizetés sikeresen megtörtént, és az időpont lefoglalásra került a Cal.com rendszerében.</p>
      <a href="index.html" class="btn">Vissza a főoldalra</a>
    </div>
  </section>
  <!-- === Szükséges scriptek (nem kell cookie consent) === -->

  <!-- Barion fizetési integráció -->
  <script src="https://api.barion.com/js/barion.js" defer></script>

  <!-- Cal.com időpontfoglaló -->
  <script src="https://cal.com/embed.js" async></script>

  <!-- Saját oldal működése -->
  <script src="/js/main.js" defer></script>

  <!-- Cookie consent manager (később az analitika/marketinghez) -->
  <script src="/js/consent.js" defer></script>

</body>

</html>
