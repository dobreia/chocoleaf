    <section class="giftcard-section">
        <div class="container-lg">
            <h1 class="main">Ajándékutalvány Édességkészítő workshopra</h1>
            <p class="second">Lepj meg valakit egy Édes Élménnyel!<br>
                Az ajándékutalvány 1 fő részére szól és beváltható a ChocoLeaf bármelyik édességkészítő workshopjára az
                utalvány értékében.</p>

            <section class="amount">
                <h3>Érték:</h3>
                <div class="amount-buttons">
                    <button class="amount-btn" onclick="selectAmount(19000, this)">19 000 Ft</button>
                    <button class="amount-btn" onclick="selectAmount(39900, this)">39 900 Ft</button>
                    <button class="amount-btn" onclick="selectAmount(29000, this)">29 000 Ft</button>
                    <button class="amount-btn" onclick="selectAmount(185900, this)">185 900 Ft</button>
                </div>
            </section>

            <section class="quantity mt-4">
                <h3>Mennyiség:</h3>
                <div class="quantity-input">
                    <button type="button" onclick="changeQuantity(-1)">-</button>
                    <input type="number" id="quantity" value="1" min="1">
                    <button type="button" onclick="changeQuantity(1)">+</button>
                </div>
            </section>

            <form id="giftForm">
                <label id="nameLabel" for="name" class="form-label">
                    <h3 id="nameTitle">Az ajándékutalványon szereplő név:</h3>
                </label>
                <div id="name"></div>
                <label id="emailLabel" for="email" class="form-label">
                    <h3>E-mail cím (ahová az utalványt küldjük):</h3>
                </label>
                <input type="email" id="email">
            </form>

            <button id="PayBtn" class="button-primary mt-4" onclick="startPayment()">
                Tovább a fizetéshez
            </button>

        </div>
    </section>

    <script>
        let selectedAmount = null;

        function selectAmount(value, btn) {
            selectedAmount = value;
            document.querySelectorAll(".amount-btn").forEach(b => b.classList.remove("active"));
            if (btn) btn.classList.add("active");
        }

        function changeQuantity(delta) {
            const input = document.getElementById("quantity");
            let newValue = (parseInt(input.value) || 1) + delta;
            if (newValue < 1) newValue = 1;
            input.value = newValue;

            renderNameInputs();
        }

        function renderNameInputs() {
            const quantity = parseInt(document.getElementById("quantity").value) || 1;
            const container = document.getElementById("name");
            const nameTitle = document.getElementById("nameTitle");

            if (quantity > 1) {
                nameTitle.textContent = "Az ajándékutalványokon szereplő nevek:";
            } else {
                nameTitle.textContent = "Az ajándékutalványon szereplő név:";
            }

            const previousValues = Array.from(container.querySelectorAll(".voucher-name"))
                .map(input => input.value);

            container.innerHTML = "";

            for (let i = 0; i < quantity; i++) {
                const input = document.createElement("input");
                input.type = "text";
                input.className = "voucher-name";

                if (quantity > 1) {
                    input.placeholder = `${i + 1}. ajándékutalvány neve`;
                }

                input.value = previousValues[i] || "";
                container.appendChild(input);
            }
        }

        async function startPayment() {
            const payBtn = document.getElementById("PayBtn");

            const email = document.getElementById("email").value.trim();
            const quantity = parseInt(document.getElementById("quantity").value) || 1;

            const names = Array.from(document.querySelectorAll(".voucher-name"))
                .map(input => input.value.trim());

            if (!selectedAmount) return alert("Kérlek válassz összeget!");
            if (!email) return alert("Kérlek add meg az email címet!");

            if (names.length !== quantity || names.some(name => !name)) {
                return alert("Kérlek add meg az összes ajándékutalványhoz tartozó nevet!");
            }

            try {
                payBtn.disabled = true;
                payBtn.textContent = "Átutalási adatok betöltése...";

                const response = await fetch("/api/giftcard/start-payment", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: names[0],
                        names: names,
                        email: email,
                        amount: selectedAmount,
                        quantity: quantity
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert("Hiba történt: " + (data.error || "Ismeretlen hiba"));
                    return;
                }

                if (data.redirectUrl) {
                    window.location.href = data.redirectUrl;
                    return;
                }

                if (data.id) {
                    window.location.href = `/transfer.html?id=${encodeURIComponent(data.id)}`;
                    return;
                }

                alert("Hiba történt: hiányzó redirectUrl/id a válaszban.");
            } catch (err) {
                console.error(err);
                alert("Nem sikerült kapcsolódni a szerverhez.");
            } finally {
                payBtn.disabled = false;
                payBtn.textContent = "Tovább a fizetéshez";
            }
        }

        document.getElementById("quantity").addEventListener("input", renderNameInputs);

        renderNameInputs();
    </script>
